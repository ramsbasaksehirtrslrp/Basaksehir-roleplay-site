<style>
:root{--or:#FF6B00;--ord:#cc5500;--nv:#0D1B3E;--wh:#fff;--gr:#f4f4f4;--mu:#888;--bd:#e0e0e0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:#fff;min-height:100vh;}

/* PAGES */
.pg{display:none;}
.pg.on{display:block;}

/* LOADING */
#bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--or);z-index:9999;transform:scaleX(0);transform-origin:left;transition:transform .3s;display:none;}
#bar.s{display:block;transform:scaleX(.7);}
#bar.d{transform:scaleX(1);opacity:0;transition:opacity .3s .1s;}

/* SYNC */
#sync{position:fixed;bottom:16px;right:16px;background:var(--nv);color:#fff;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;z-index:999;opacity:0;transition:opacity .4s;pointer-events:none;}
#sync.on{opacity:1;}
#sync .dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pu 1.2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#loginScr{display:none;position:fixed;inset:0;background:var(--nv);z-index:1000;align-items:center;justify-content:center;}
#loginScr.on{display:flex;}
.lbox{background:#fff;border-radius:14px;padding:48px 40px;width:380px;box-shadow:0 30px 80px rgba(0,0,0,.5);text-align:center;}
.llogo{width:84px;height:84px;border-radius:50%;margin:0 auto 20px;overflow:hidden;border:3px solid var(--or);display:flex;align-items:center;justify-content:center;background:var(--nv);}
.llogo img{width:100%;height:100%;object-fit:contain;}
.lbox h2{font-family:'Bebas Neue';font-size:28px;color:var(--nv);letter-spacing:2px;margin-bottom:6px;}
.lbox p{color:var(--mu);font-size:13px;margin-bottom:28px;}
.lbox input{width:100%;padding:12px 16px;border:2px solid var(--bd);border-radius:8px;font-size:15px;font-family:'Barlow';margin-bottom:14px;outline:none;transition:border-color .2s;}
.lbox input:focus{border-color:var(--or);}
.lbtn{width:100%;padding:14px;background:var(--or);color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;cursor:pointer;transition:background .2s;}
.lbtn:hover{background:var(--ord);}
.lerr{color:#e33;font-size:13px;margin-top:12px;display:none;}

/* HEADER */
header{background:var(--nv);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.35);}
.hi{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:64px;gap:24px;}
.slogo{display:flex;align-items:center;gap:12px;cursor:pointer;flex-shrink:0;}
.slogo-img{width:44px;height:44px;border-radius:50%;overflow:hidden;background:var(--nv);display:flex;align-items:center;justify-content:center;}
.slogo-img img{width:100%;height:100%;object-fit:contain;}
.slogo-txt{font-family:'Bebas Neue';color:#fff;font-size:21px;letter-spacing:2px;line-height:1.1;}
.slogo-txt span{display:block;color:var(--or);font-size:11px;letter-spacing:4px;}
nav{display:flex;gap:4px;flex:1;}
nav button{background:none;border:none;color:rgba(255,255,255,.65);font-family:'Barlow Condensed';font-size:15px;font-weight:700;letter-spacing:1px;padding:8px 16px;border-radius:6px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
nav button:hover{color:#fff;background:rgba(255,255,255,.08);}
nav button.on{color:var(--or);border-bottom:2px solid var(--or);border-radius:6px 6px 0 0;}
.ha{margin-left:auto;display:flex;gap:10px;}
#aBtn{background:var(--or);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:background .2s;}
#aBtn:hover{background:var(--ord);}
#oBtn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 18px;border-radius:6px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;cursor:pointer;display:none;letter-spacing:1px;text-transform:uppercase;}
#oBtn.on{display:block;}

/* HERO */
.hero{background:var(--nv);padding:60px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(255,107,0,.15) 0%,transparent 70%);pointer-events:none;}
.hlogo{width:72px;height:72px;margin:0 auto 16px;}
.hlogo img{width:100%;height:100%;object-fit:contain;}
.hero h1{font-family:'Bebas Neue';color:#fff;font-size:clamp(36px,6vw,68px);letter-spacing:4px;line-height:1;}
.hero h1 span{color:var(--or);}
.hero p{color:rgba(255,255,255,.55);margin-top:10px;font-size:15px;}

.mw{max-width:1200px;margin:0 auto;padding:40px 24px;}
.st{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:var(--nv);margin-bottom:24px;padding-bottom:12px;border-bottom:3px solid var(--or);display:flex;align-items:center;justify-content:space-between;}
.ab{background:var(--or);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;display:none;transition:background .2s;}
.ab:hover{background:var(--ord);}
.ab.on{display:inline-block;}

/* BLOG */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;}
.bc{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;cursor:pointer;}
.bc:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.12);}
.bcimg{height:190px;background:var(--nv);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.bcimg img{width:100%;height:100%;object-fit:cover;}
.bcimg .noimg{opacity:.25;width:64px;height:64px;object-fit:contain;}
.bcb{padding:18px;}
.bcat{background:var(--or);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.btit{font-family:'Barlow Condensed';font-size:19px;font-weight:700;color:var(--nv);margin-bottom:6px;line-height:1.3;}
.bex{font-size:14px;color:var(--mu);line-height:1.6;}
.bft{padding:12px 18px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--mu);}

/* KADRO */
.ksec{margin-bottom:36px;}
.kstit{font-family:'Bebas Neue';font-size:16px;letter-spacing:3px;color:#fff;background:var(--nv);padding:7px 14px;border-radius:6px;margin-bottom:14px;display:inline-block;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
.kc{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px 14px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.05);transition:transform .2s;}
.kc:hover{transform:translateY(-3px);}
.kav{width:68px;height:68px;background:var(--nv);border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';color:var(--or);font-size:26px;overflow:hidden;border:3px solid var(--or);}
.kav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.kno{background:var(--or);color:#fff;font-family:'Bebas Neue';font-size:13px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px;}
.kna{font-family:'Barlow Condensed';font-weight:700;font-size:15px;color:var(--nv);margin-bottom:3px;line-height:1.2;}
.kpo{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.knt{font-size:11px;color:#bbb;margin-top:2px;}

/* MAÇLAR */
.mlist{display:flex;flex-direction:column;gap:18px;}
.mc{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.mch{background:var(--nv);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.mchl{display:flex;gap:12px;align-items:center;}
.mbdg{background:var(--or);color:#fff;font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;padding:3px 10px;border-radius:4px;}
.mdt{color:rgba(255,255,255,.65);font-size:13px;}
.mcb{padding:24px 18px;display:flex;align-items:center;justify-content:center;gap:20px;}
.mt{text-align:center;flex:1;}
.mlo{width:76px;height:76px;margin:0 auto 10px;background:var(--gr);border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:30px;}
.mlo img{width:100%;height:100%;object-fit:contain;}
.mtn{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--nv);}
.mvs{font-family:'Bebas Neue';font-size:42px;color:var(--nv);opacity:.12;}
.msc{font-family:'Bebas Neue';font-size:50px;color:var(--or);letter-spacing:4px;}
.mmeta{padding:10px 18px;background:var(--gr);display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--mu);border-top:1px solid var(--bd);}

/* ADMIN */
.adm{display:flex;gap:8px;}
.ebtn,.dbtn{border:none;border-radius:4px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;}
.ebtn{background:var(--nv);color:#fff;}
.dbtn{background:#fee;color:#c33;}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:20px;}
.mbg.on{display:flex;}
.mbox{background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.35);}
.mhd{background:var(--nv);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0;}
.mhd h3{font-family:'Bebas Neue';color:#fff;font-size:20px;letter-spacing:2px;}
.mcl{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;}
.mbd{padding:24px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--nv);margin-bottom:5px;}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;border:2px solid var(--bd);border-radius:8px;font-size:14px;font-family:'Barlow';outline:none;transition:border-color .2s;background:#fff;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--or);}
.fg textarea{resize:vertical;min-height:90px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sbtn{width:100%;padding:14px;background:var(--or);color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;cursor:pointer;transition:background .2s;margin-top:8px;}
.sbtn:hover{background:var(--ord);}
.sbtn:disabled{background:#ccc;cursor:not-allowed;}

/* DETAY */
.dbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;overflow-y:auto;padding:40px 20px;}
.dbg.on{display:block;}
.dbox{background:#fff;border-radius:16px;max-width:760px;margin:0 auto;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.dhimg{width:100%;height:300px;object-fit:cover;display:block;}
.dph{width:100%;height:180px;background:var(--nv);display:flex;align-items:center;justify-content:center;}
.dph img{width:72px;height:72px;object-fit:contain;opacity:.35;}
.dbd{padding:32px 36px;}
.dmeta{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.dcat{background:var(--or);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:4px;}
.ddate{color:var(--mu);font-size:13px;}
.dtit{font-family:'Bebas Neue';font-size:clamp(26px,4vw,40px);color:var(--nv);letter-spacing:2px;line-height:1.15;margin-bottom:20px;}
.dcnt{font-size:16px;line-height:1.9;color:#333;white-space:pre-wrap;word-break:break-word;}
.dft{padding:18px 36px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;}
.dcls{background:var(--nv);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}

.empty{text-align:center;padding:70px 20px;color:var(--mu);}
.empty .ico{font-size:48px;margin-bottom:12px;opacity:.25;}
</style>
</head>
<body>

<div id="bar"></div>
<div id="sync"><span class="dot"></span> Canlı Sync</div>

<!-- LOGIN -->
<div id="loginScr">
  <div class="lbox">
    <div class="llogo"><img id="ll" src="" alt="logo"></div>
    <h2>Admin Girişi</h2>
    <p>Rams Başakşehir Yönetim Paneli</p>
    <input type="text" id="lu" placeholder="Kullanıcı Adı" autocomplete="off">
    <input type="password" id="lp" placeholder="Şifre">
    <button class="lbtn" onclick="doLogin()">GİRİŞ YAP</button>
    <div class="lerr" id="le">Kullanıcı adı veya şifre hatalı!</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="hi">
    <div class="slogo" onclick="go('blog')">
      <div class="slogo-img"><img id="hl" src="" alt="logo"></div>
      <div class="slogo-txt">Rams Başakşehir<span>Resmi Blog</span></div>
    </div>
    <nav>
      <button id="nb" class="on" onclick="go('blog')">Blog</button>
      <button id="nk" onclick="go('kadro')">Kadro</button>
      <button id="nm" onclick="go('mac')">Maçlar</button>
    </nav>
    <div class="ha">
      <button id="aBtn" onclick="openLogin()">Admin</button>
      <button id="oBtn" onclick="logout()">Çıkış</button>
    </div>
  </div>
</header>

<!-- BLOG -->
<div id="pBlog" class="pg on">
  <div class="hero">
    <div class="hlogo"><img id="hl2" src="" alt=""></div>
    <h1>RAMS <span>BAŞAKŞEHIR</span></h1>
    <p>Resmi Kulüp Blogu</p>
  </div>
  <div class="mw">
    <div class="st">Son Haberler <button class="ab" id="abBlog" onclick="openModal('blog')">+ Yazı Ekle</button></div>
    <div class="bgrid" id="blogGrid"></div>
  </div>
</div>

<!-- KADRO -->
<div id="pKadro" class="pg">
  <div class="hero">
    <div class="hlogo"><img id="hl3" src="" alt=""></div>
    <h1>OYUNCU <span>KADROSU</span></h1>
    <p>2025–2026 Sezonu</p>
  </div>
  <div class="mw">
    <div class="st">Kadro <button class="ab" id="abKadro" onclick="openModal('kadro')">+ Oyuncu Ekle</button></div>
    <div id="kadroWrap"></div>
  </div>
</div>

<!-- MAÇLAR -->
<div id="pMac" class="pg">
  <div class="hero">
    <div class="hlogo"><img id="hl4" src="" alt=""></div>
    <h1>MAÇ <span>TAKVİMİ</span></h1>
    <p>Fikstür ve Sonuçlar</p>
  </div>
  <div class="mw">
    <div class="st">Maçlar <button class="ab" id="abMac" onclick="openModal('mac')">+ Maç Ekle</button></div>
    <div class="mlist" id="macList"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="modalBg" onclick="bgClk(event)">
  <div class="mbox" id="modalBox"></div>
</div>

<!-- DETAY -->
<div class="dbg" id="detBg" onclick="detBgClk(event)">
  <div class="dbox" id="detBox"></div>
</div>

<script>
const AU='rams_admin', AP='Basaksehir2024!';
let isAdmin=false, editId=null, editType=null;
window._blog=[]; window._kadro=[]; window._mac=[];

// Logoları hemen uygula
document.querySelectorAll('#hl,#ll,#hl2,#hl3,#hl4').forEach(el=>el.src=LOGO);

// Firebase
document.addEventListener('fbReady', init);
if(window._fbReady) init();

function init(){
  const {collection,query,orderBy,onSnapshot}=window._fb;
  const db=window._db;
  onSnapshot(query(collection(db,'blog'),orderBy('createdAt','desc')),s=>{
    window._blog=s.docs.map(d=>({id:d.id,...d.data()}));
    renderBlog(); flash();
  });
  onSnapshot(query(collection(db,'kadro'),orderBy('no')),s=>{
    window._kadro=s.docs.map(d=>({id:d.id,...d.data()}));
    renderKadro();
  });
  onSnapshot(query(collection(db,'mac'),orderBy('createdAt','desc')),s=>{
    window._mac=s.docs.map(d=>({id:d.id,...d.data()}));
    renderMac();
  });
}

function flash(){
  const e=document.getElementById('sync');
  e.classList.add('on');
  setTimeout(()=>e.classList.remove('on'),2000);
}

// Auth
function openLogin(){ document.getElementById('loginScr').classList.add('on'); }
function closeLogin(){ document.getElementById('loginScr').classList.remove('on'); }
function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(u===AU&&p===AP){isAdmin=true;closeLogin();setUI();}
  else document.getElementById('le').style.display='block';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScr').classList.contains('on')) doLogin();
});
function logout(){isAdmin=false;setUI();}
function setUI(){
  document.getElementById('aBtn').style.display=isAdmin?'none':'';
  document.getElementById('oBtn').classList.toggle('on',isAdmin);
  document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('on',isAdmin));
  renderBlog();renderKadro();renderMac();
}

// Navigation
function go(p){
  ['blog','kadro','mac'].forEach(x=>{
    document.getElementById('p'+cap(x)).classList.remove('on');
    document.getElementById('n'+x[0]).classList.remove('on');
  });
  document.getElementById('p'+cap(p)).classList.add('on');
  document.getElementById('n'+p[0]).classList.add('on');
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// Render helpers
function adm(type,id){
  if(!isAdmin) return '';
  return '<div class="adm"><button class="ebtn" onclick="editItm(\''+type+'\',\''+id+'\')">Düzenle</button><button class="dbtn" onclick="delItm(\''+type+'\',\''+id+'\')">Sil</button></div>';
}

// Blog
function renderBlog(){
  const g=document.getElementById('blogGrid');
  if(!window._blog.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ico">📰</div><p>Henüz yazı yok.</p></div>';return;}
  g.innerHTML=window._blog.map(b=>
    '<div class="bc" onclick="openDet(\''+b.id+'\')">'+
    '<div class="bcimg">'+(b.img?'<img src="'+b.img+'">'  :'<img class="noimg" src="'+LOGO+'">')+'</div>'+
    '<div class="bcb">'+
    (b.category?'<span class="bcat">'+b.category+'</span>':'')+
    '<div class="btit">'+( b.title||'')+'</div>'+
    '<div class="bex">'+(b.content?b.content.substring(0,120)+'...':'')+'</div>'+
    '</div>'+
    '<div class="bft"><span>'+(b.date||'')+'</span><div onclick="event.stopPropagation()">'+adm('blog',b.id)+'</div></div>'+
    '</div>'
  ).join('');
}

// Kadro
function renderKadro(){
  const wrap=document.getElementById('kadroWrap');
  if(!window._kadro.length){wrap.innerHTML='<div class="empty"><div class="ico">⚽</div><p>Henüz oyuncu yok.</p></div>';return;}
  const grps={'Kaleci':[],'Defans':[],'Orta Saha':[],'Forvet':[],'Teknik Direktör':[],'Antrenör':[]};
  window._kadro.forEach(k=>{
    if(grps[k.position]!==undefined) grps[k.position].push(k);
    else{if(!grps['Diğer']) grps['Diğer']=[];grps['Diğer'].push(k);}
  });
  let html='';
  for(const[pos,pls] of Object.entries(grps)){
    if(!pls.length) continue;
    html+='<div class="ksec"><div class="kstit">'+pos+'</div><div class="kgrid">'+
    pls.map(k=>
      '<div class="kc">'+
      '<div class="kav">'+(k.img?'<img src="'+k.img+'">':(k.name||'?').charAt(0))+'</div>'+
      '<div class="kno">#'+(k.no||'?')+'</div>'+
      '<div class="kna">'+(k.name||'')+'</div>'+
      '<div class="kpo">'+(k.position||'')+'</div>'+
      '<div class="knt">'+(k.nationality||'')+'</div>'+
      '<div style="margin-top:8px">'+adm('kadro',k.id)+'</div>'+
      '</div>'
    ).join('')+'</div></div>';
  }
  wrap.innerHTML=html;
}

// Maç
function renderMac(){
  const l=document.getElementById('macList');
  if(!window._mac.length){l.innerHTML='<div class="empty"><div class="ico">🏟️</div><p>Henüz maç yok.</p></div>';return;}
  l.innerHTML=window._mac.map(m=>
    '<div class="mc">'+
    '<div class="mch">'+
    '<div class="mchl"><span class="mbdg">'+(m.league||'Lig Maçı')+'</span><span class="mdt">📅 '+(m.date||'')+(m.time?' ⏰ '+m.time:'')+'</span></div>'+
    adm('mac',m.id)+
    '</div>'+
    '<div class="mcb">'+
    '<div class="mt"><div class="mlo">'+(m.team1logo?'<img src="'+m.team1logo+'">':'<img src="'+LOGO+'">')+'</div><div class="mtn">'+(m.team1||'Ev Sahibi')+'</div></div>'+
    (m.score1!==undefined&&m.score1!==''?'<div class="msc">'+m.score1+' - '+m.score2+'</div>':'<div class="mvs">VS</div>')+
    '<div class="mt"><div class="mlo">'+(m.team2logo?'<img src="'+m.team2logo+'">':'⚽')+'</div><div class="mtn">'+(m.team2||'Deplasman')+'</div></div>'+
    '</div>'+
    '<div class="mmeta">'+
    (m.referee?'<span>⚖️ '+m.referee+'</span>':'')+
    (m.stadium?'<span>🏟️ '+m.stadium+'</span>':'')+
    (m.weather?'<span>🌤️ '+m.weather+'</span>':'')+
    (m.city?'<span>📍 '+m.city+'</span>':'')+
    '</div></div>'
  ).join('');
}

// Blog detay
function openDet(id){
  const b=window._blog.find(x=>x.id===id); if(!b) return;
  document.getElementById('detBox').innerHTML=
    (b.img?'<img class="dhimg" src="'+b.img+'">'  :'<div class="dph"><img src="'+LOGO+'"></div>')+
    '<div class="dbd">'+
    '<div class="dmeta">'+(b.category?'<span class="dcat">'+b.category+'</span>':'')+(b.date?'<span class="ddate">📅 '+b.date+'</span>':'')+'</div>'+
    '<div class="dtit">'+(b.title||'')+'</div>'+
    '<div class="dcnt">'+(b.content||'')+'</div>'+
    '</div>'+
    '<div class="dft"><button class="dcls" onclick="closeDet()">← Geri Dön</button></div>';
  document.getElementById('detBg').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeDet(){document.getElementById('detBg').classList.remove('on');document.body.style.overflow='';}
function detBgClk(e){if(e.target===document.getElementById('detBg')) closeDet();}

// Modal
function openModal(type,item){
  editId=item?.id||null; editType=type;
  const v=(k,fb='')=>item?.[k]??fb;
  let h='';
  const mh='<div class="mhd"><h3>'+(editId?'DÜZENLE':'YENİ '+type.toUpperCase())+'</h3><button class="mcl" onclick="closeModal()">✕</button></div><div class="mbd">';

  if(type==='blog'){
    h=mh+
    '<div class="fg"><label>Başlık</label><input id="ft" value="'+v('title')+'"></div>'+
    '<div class="fr"><div class="fg"><label>Kategori</label><input id="fca" value="'+v('category')+'"></div>'+
    '<div class="fg"><label>Tarih</label><input type="date" id="fd" value="'+v('date')+'"></div></div>'+
    '<div class="fg"><label>İçerik</label><textarea id="fc">'+v('content')+'</textarea></div>'+
    '<div class="fg"><label>Kapak Foto URL</label><input id="fi" placeholder="https://..." value="'+v('img')+'" oninput="prv(this.value,\'pi\')">'+
    (v('img')?'<img id="pi" src="'+v('img')+'" style="display:block;width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-top:8px">':'<img id="pi" style="display:none;width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-top:8px">')+
    '</div>'+
    '<button class="sbtn" id="sbtn" onclick="saveItm()">KAYDET</button></div>';
  } else if(type==='kadro'){
    h=mh+
    '<div class="fr"><div class="fg"><label>Ad Soyad</label><input id="fn" value="'+v('name')+'"></div>'+
    '<div class="fg"><label>Forma No</label><input type="number" id="fno" value="'+v('no')+'"></div></div>'+
    '<div class="fr"><div class="fg"><label>Mevki</label><select id="fp">'+
    ['Kaleci','Defans','Orta Saha','Forvet','Teknik Direktör','Antrenör'].map(p=>'<option'+(v('position')===p?' selected':'')+'>'+p+'</option>').join('')+
    '</select></div><div class="fg"><label>Milliyet</label><input id="fnat" value="'+v('nationality')+'"></div></div>'+
    '<div class="fg"><label>Fotoğraf URL</label><input id="fi" placeholder="https://..." value="'+v('img')+'" oninput="prv(this.value,\'pi\')">'+
    (v('img')?'<img id="pi" src="'+v('img')+'" style="display:block;width:56px;height:56px;object-fit:cover;border-radius:50%;margin-top:8px;border:3px solid var(--or)">':'<img id="pi" style="display:none;width:56px;height:56px;object-fit:cover;border-radius:50%;margin-top:8px;border:3px solid var(--or)">')+
    '</div>'+
    '<button class="sbtn" id="sbtn" onclick="saveItm()">KAYDET</button></div>';
  } else if(type==='mac'){
    h=mh+
    '<div class="fr"><div class="fg"><label>Takım 1</label><input id="ft1" value="'+v('team1','Rams Başakşehir')+'"></div>'+
    '<div class="fg"><label>Takım 2</label><input id="ft2" value="'+v('team2')+'"></div></div>'+
    '<div class="fr"><div class="fg"><label>Takım 1 Logo URL</label><input id="fl1" placeholder="https://..." value="'+v('team1logo')+'" oninput="prv(this.value,\'pl1\')">'+
    (v('team1logo')?'<img id="pl1" src="'+v('team1logo')+'" style="display:block;width:44px;height:44px;object-fit:contain;margin-top:6px">':'<img id="pl1" style="display:none;width:44px;height:44px;object-fit:contain;margin-top:6px">')+
    '</div><div class="fg"><label>Takım 2 Logo URL</label><input id="fl2" placeholder="https://..." value="'+v('team2logo')+'" oninput="prv(this.value,\'pl2\')">'+
    (v('team2logo')?'<img id="pl2" src="'+v('team2logo')+'" style="display:block;width:44px;height:44px;object-fit:contain;margin-top:6px">':'<img id="pl2" style="display:none;width:44px;height:44px;object-fit:contain;margin-top:6px">')+
    '</div></div>'+
    '<div class="fr"><div class="fg"><label>Tarih</label><input type="date" id="fd" value="'+v('date')+'"></div>'+
    '<div class="fg"><label>Saat</label><input type="time" id="ftm" value="'+v('time')+'"></div></div>'+
    '<div class="fg"><label>Lig / Kupa</label><input id="flg" value="'+v('league','Süper Lig')+'"></div>'+
    '<div class="fr"><div class="fg"><label>Stad</label><input id="fst" value="'+v('stadium')+'"></div>'+
    '<div class="fg"><label>Şehir</label><input id="fci" value="'+v('city')+'"></div></div>'+
    '<div class="fr"><div class="fg"><label>Hakem</label><input id="frf" value="'+v('referee')+'"></div>'+
    '<div class="fg"><label>Hava Durumu</label><input id="fhv" value="'+v('weather')+'" placeholder="18°C Güneşli"></div></div>'+
    '<div class="fr"><div class="fg"><label>Skor T1</label><input type="number" id="fs1" value="'+v('score1')+'"></div>'+
    '<div class="fg"><label>Skor T2</label><input type="number" id="fs2" value="'+v('score2')+'"></div></div>'+
    '<button class="sbtn" id="sbtn" onclick="saveItm()">KAYDET</button></div>';
  }
  document.getElementById('modalBox').innerHTML=h;
  document.getElementById('modalBg').classList.add('on');
}

function closeModal(){document.getElementById('modalBg').classList.remove('on');editId=null;editType=null;}
function bgClk(e){if(e.target===document.getElementById('modalBg')) closeModal();}
function editItm(type,id){
  const src=type==='blog'?window._blog:type==='kadro'?window._kadro:window._mac;
  const item=src.find(x=>x.id===id);
  if(item) openModal(type,item);
}
function prv(url,pid){
  const img=document.getElementById(pid);
  if(!img) return;
  img.src=url; img.style.display=url?'block':'none';
}
function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}

async function saveItm(){
  if(!window._db){alert('Firebase bağlı değil!');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='KAYDEDİLİYOR...';
  load(true);
  const {collection,addDoc,doc,updateDoc}=window._fb;
  const db=window._db;
  const ts=Date.now();
  let obj={};
  try{
    if(editType==='blog'){
      const imgUrl=gv('fi')||(editId?(window._blog.find(x=>x.id===editId)?.img||''):'');
      obj={title:gv('ft'),category:gv('fca'),date:gv('fd'),content:gv('fc'),createdAt:ts};
      if(imgUrl) obj.img=imgUrl;
    } else if(editType==='kadro'){
      const imgUrl=gv('fi')||(editId?(window._kadro.find(x=>x.id===editId)?.img||''):'');
      obj={name:gv('fn'),no:parseInt(gv('fno'))||0,position:gv('fp'),nationality:gv('fnat'),createdAt:ts};
      if(imgUrl) obj.img=imgUrl;
    } else if(editType==='mac'){
      const ex=editId?window._mac.find(x=>x.id===editId):null;
      obj={team1:gv('ft1'),team2:gv('ft2'),date:gv('fd'),time:gv('ftm'),league:gv('flg'),stadium:gv('fst'),city:gv('fci'),referee:gv('frf'),weather:gv('fhv'),score1:gv('fs1'),score2:gv('fs2'),createdAt:ts};
      const l1=gv('fl1')||ex?.team1logo||''; if(l1) obj.team1logo=l1;
      const l2=gv('fl2')||ex?.team2logo||''; if(l2) obj.team2logo=l2;
    }
    if(editId) await updateDoc(doc(db,editType,editId),obj);
    else await addDoc(collection(db,editType),obj);
    load(false);closeModal();
  } catch(err){
    alert('Hata: '+err.message);
    btn.disabled=false;btn.textContent='KAYDET';
    load(false);
  }
}

async function delItm(type,id){
  if(!confirm('Silmek istediğinize emin misiniz?')) return;
  load(true);
  const {doc,deleteDoc}=window._fb;
  try{await deleteDoc(doc(window._db,type,id));}catch(e){console.error(e);}
  load(false);
}

function load(on){
  const b=document.getElementById('bar');
  if(on){b.className='s';}else{b.className='d';setTimeout(()=>b.className='',400);}
}
</script>
