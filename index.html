<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rams Başakşehir</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvS-Feo76ri9eN9191Qj9C5AuOuuhFyts",
    authDomain: "rp-bsk.firebaseapp.com",
    projectId: "rp-bsk",
    storageBucket: "rp-bsk.firebasestorage.app",
    messagingSenderId: "880476581176",
    appId: "1:880476581176:web:7403dd1a91ce6bf15865cd",
    measurementId: "G-9B5WG2REPL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  window._fb = { db, storage, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, setDoc, getDoc, ref, uploadString, getDownloadURL, deleteObject };
  window._fbReady = true;
  document.dispatchEvent(new Event('fbReady'));
</script>

<style>
  :root {
    --orange: #FF6B00;
    --orange-dark: #cc5500;
    --navy: #0D1B3E;
    --white: #FFFFFF;
    --gray: #f4f4f4;
    --text-dark: #111;
    --text-muted: #888;
    --border: #e0e0e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--white); color: var(--text-dark); min-height: 100vh; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* LOADING BAR */
  #loadingBar {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: var(--orange); z-index: 9999;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s; display: none;
  }
  #loadingBar.show { display: block; transform: scaleX(0.7); }
  #loadingBar.done { transform: scaleX(1); opacity: 0; transition: opacity 0.3s 0.1s; }

  /* SYNC INDICATOR */
  #syncDot {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--navy); color: white;
    padding: 7px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    z-index: 999; opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  #syncDot.show { opacity: 1; }
  #syncDot .dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* LOGIN */
  #loginScreen {
    display: none; position: fixed; inset: 0;
    background: var(--navy); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #loginScreen.active { display: flex; }
  .login-box {
    background: white; border-radius: 14px; padding: 48px 40px;
    width: 380px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); text-align: center;
  }
  .login-logo {
    width: 84px; height: 84px; background: var(--navy); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-family: 'Bebas Neue'; color: var(--orange);
    font-size: 28px; overflow: hidden; border: 3px solid var(--orange);
  }
  .login-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
  .login-box h2 { font-family: 'Bebas Neue'; font-size: 28px; color: var(--navy); letter-spacing: 2px; margin-bottom: 6px; }
  .login-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: 'Barlow';
    margin-bottom: 14px; outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--orange); }
  .login-btn {
    width: 100%; padding: 14px; background: var(--orange); color: white; border: none;
    border-radius: 8px; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: var(--orange-dark); }
  .login-error { color: #e33; font-size: 13px; margin-top: 12px; display: none; }

  /* HEADER */
  header { background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.35); }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; height: 64px; gap: 24px;
  }
  .site-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; flex-shrink: 0; }
  .site-logo-img {
    width: 44px; height: 44px; background: var(--orange); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-family: 'Bebas Neue'; color: white; font-size: 16px;
  }
  .site-logo-img img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
  .site-logo-text { font-family: 'Bebas Neue'; color: white; font-size: 21px; letter-spacing: 2px; line-height: 1.1; }
  .site-logo-text span { display: block; color: var(--orange); font-size: 11px; letter-spacing: 4px; }

  nav { display: flex; gap: 4px; flex: 1; }
  nav button {
    background: none; border: none; color: rgba(255,255,255,0.65);
    font-family: 'Barlow Condensed'; font-size: 15px; font-weight: 700;
    letter-spacing: 1px; padding: 8px 16px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  nav button:hover { color: white; background: rgba(255,255,255,0.08); }
  nav button.active { color: var(--orange); border-bottom: 2px solid var(--orange); border-radius: 6px 6px 0 0; }

  .header-actions { margin-left: auto; display: flex; gap: 10px; }
  #adminBtn {
    background: var(--orange); color: white; border: none; padding: 8px 18px;
    border-radius: 6px; font-family: 'Barlow Condensed'; font-weight: 700;
    font-size: 14px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: background 0.2s;
  }
  #adminBtn:hover { background: var(--orange-dark); }
  #logoutBtn {
    background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 18px; border-radius: 6px; font-family: 'Barlow Condensed'; font-weight: 700;
    font-size: 14px; cursor: pointer; display: none; letter-spacing: 1px; text-transform: uppercase;
  }
  #logoutBtn.vis { display: block; }

  /* HERO */
  .hero {
    background: var(--navy); padding: 60px 24px; text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 { font-family: 'Bebas Neue'; color: white; font-size: clamp(40px,6vw,72px); letter-spacing: 4px; line-height: 1; }
  .hero h1 span { color: var(--orange); }
  .hero p { color: rgba(255,255,255,0.55); margin-top: 12px; font-size: 16px; }

  .main-wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

  .section-title {
    font-family: 'Bebas Neue'; font-size: 30px; letter-spacing: 3px; color: var(--navy);
    margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid var(--orange);
    display: flex; align-items: center; justify-content: space-between;
  }
  .add-btn {
    background: var(--orange); color: white; border: none; padding: 8px 20px;
    border-radius: 6px; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 14px;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase; display: none; transition: background 0.2s;
  }
  .add-btn:hover { background: var(--orange-dark); }
  .add-btn.vis { display: inline-block; }

  /* BLOG */
  .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
  .blog-card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .blog-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.12); }
  .blog-card-img { height: 200px; background: var(--navy); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .blog-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .blog-card-img .no-img { font-family: 'Bebas Neue'; color: var(--orange); font-size: 52px; opacity: 0.25; }
  .blog-card-body { padding: 20px; }
  .blog-cat {
    background: var(--orange); color: white; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px;
    border-radius: 4px; display: inline-block; margin-bottom: 10px;
  }
  .blog-title { font-family: 'Barlow Condensed'; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; line-height: 1.3; }
  .blog-excerpt { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .blog-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-muted);
  }

  /* KADRO */
  .kadro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
  .kadro-card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 24px 16px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.05); transition: transform 0.2s;
  }
  .kadro-card:hover { transform: translateY(-3px); }
  .k-avatar {
    width: 72px; height: 72px; background: var(--navy); border-radius: 50%;
    margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; color: var(--orange); font-size: 28px;
    overflow: hidden; border: 3px solid var(--orange);
  }
  .k-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .k-no { background: var(--orange); color: white; font-family: 'Bebas Neue'; font-size: 13px; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
  .k-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 17px; color: var(--navy); margin-bottom: 4px; }
  .k-pos { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .k-nat { font-size: 12px; color: #bbb; margin-top: 3px; }

  /* MAÇLAR */
  .mac-list { display: flex; flex-direction: column; gap: 20px; }
  .mac-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .mac-head { background: var(--navy); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .mac-head-left { display: flex; gap: 14px; align-items: center; }
  .mac-badge { background: var(--orange); color: white; font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 2px; padding: 3px 10px; border-radius: 4px; }
  .mac-date { color: rgba(255,255,255,0.65); font-size: 13px; }
  .mac-body { padding: 28px 20px; display: flex; align-items: center; justify-content: center; gap: 24px; }
  .mac-team { text-align: center; flex: 1; }
  .mac-logo {
    width: 80px; height: 80px; margin: 0 auto 10px; background: var(--gray);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 34px;
  }
  .mac-logo img { width: 100%; height: 100%; object-fit: contain; }
  .mac-tname { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 18px; color: var(--navy); }
  .mac-vs { font-family: 'Bebas Neue'; font-size: 44px; color: var(--navy); opacity: 0.12; }
  .mac-score { font-family: 'Bebas Neue'; font-size: 52px; color: var(--orange); letter-spacing: 4px; }
  .mac-meta { padding: 12px 20px; background: var(--gray); display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border); }

  /* ADMIN ACTIONS */
  .adm { display: flex; gap: 8px; }
  .ebtn, .dbtn { border: none; border-radius: 4px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .ebtn { background: var(--navy); color: white; }
  .dbtn { background: #fee; color: #c33; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: white; border-radius: 14px; width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,0.35); }
  .modal-head { background: var(--navy); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-radius: 14px 14px 0 0; }
  .modal-head h3 { font-family: 'Bebas Neue'; color: white; font-size: 22px; letter-spacing: 2px; }
  .mclose { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; }
  .modal-body { padding: 28px 24px; }
  .fg { margin-bottom: 18px; }
  .fg label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--navy); margin-bottom: 6px; }
  .fg input, .fg textarea, .fg select {
    width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: 'Barlow'; outline: none; transition: border-color 0.2s; background: white;
  }
  .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--orange); }
  .fg textarea { resize: vertical; min-height: 100px; }
  .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .sbtn {
    width: 100%; padding: 14px; background: var(--orange); color: white; border: none;
    border-radius: 8px; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px;
    cursor: pointer; transition: background 0.2s; margin-top: 8px;
  }
  .sbtn:hover { background: var(--orange-dark); }
  .sbtn:disabled { background: #ccc; cursor: not-allowed; }

  .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .empty .ico { font-size: 52px; margin-bottom: 14px; opacity: 0.25; }

  .img-prev { width: 56px; height: 40px; object-fit: cover; border-radius: 4px; margin-top: 6px; display: block; }
  .img-prev-round { width: 48px; height: 48px; object-fit: cover; border-radius: 50%; margin-top: 6px; display: block; }
</style>
</head>
<body>

<div id="loadingBar"></div>
<div id="syncDot"><span class="dot"></span> Canlı Sync</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo" id="loginLogo">RB</div>
    <h2>Admin Girişi</h2>
    <p>Rams Başakşehir Yönetim Paneli</p>
    <input type="text" id="lusr" placeholder="Kullanıcı Adı" autocomplete="off">
    <input type="password" id="lpass" placeholder="Şifre">
    <button class="login-btn" onclick="doLogin()">GİRİŞ YAP</button>
    <div class="login-error" id="lerr">Kullanıcı adı veya şifre hatalı!</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="site-logo" onclick="showPage('blog')">
      <div class="site-logo-img" id="hLogo">RB</div>
      <div class="site-logo-text">Rams Başakşehir<span>Resmi Blog</span></div>
    </div>
    <nav>
      <button id="navBlog" class="active" onclick="showPage('blog')">Blog</button>
      <button id="navKadro" onclick="showPage('kadro')">Kadro</button>
      <button id="navMac" onclick="showPage('mac')">Maçlar</button>
    </nav>
    <div class="header-actions">
      <button id="adminBtn" onclick="openLogin()">Admin</button>
      <button id="logoutBtn" onclick="logout()">Çıkış</button>
    </div>
  </div>
</header>

<!-- BLOG PAGE -->
<div id="blogPage" class="screen active">
  <div class="hero"><h1>RAMS <span>BAŞAKŞEHIR</span></h1><p>Resmi Kulüp Blogu</p></div>
  <div class="main-wrap">
    <div class="section-title">Son Haberler <button class="add-btn" id="addBlogBtn" onclick="openModal('blog')">+ Yazı Ekle</button></div>
    <div class="blog-grid" id="blogGrid"></div>
  </div>
</div>

<!-- KADRO PAGE -->
<div id="kadroPage" class="screen">
  <div class="hero"><h1>OYUNCU <span>KADROSU</span></h1><p>2024–2025 Sezonu</p></div>
  <div class="main-wrap">
    <div class="section-title">Kadro <button class="add-btn" id="addKadroBtn" onclick="openModal('kadro')">+ Oyuncu Ekle</button></div>
    <div class="kadro-grid" id="kadroGrid"></div>
  </div>
</div>

<!-- MAÇ PAGE -->
<div id="macPage" class="screen">
  <div class="hero"><h1>MAÇ <span>TAKVİMİ</span></h1><p>Fikstür ve Sonuçlar</p></div>
  <div class="main-wrap">
    <div class="section-title">Maçlar <button class="add-btn" id="addMacBtn" onclick="openModal('mac')">+ Maç Ekle</button></div>
    <div class="mac-list" id="macList"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="bgClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const AU = 'rams_admin', AP = 'Basaksehir2024!';
let isAdmin = false, editId = null, editType = null, imgCache = {};

window._blog = []; window._kadro = []; window._mac = [];

/* ── Firebase listeners ── */
document.addEventListener('fbReady', startListeners);
if (window._fbReady) startListeners();

function startListeners() {
  const { db, collection, query, orderBy, onSnapshot } = window._fb;

  onSnapshot(query(collection(db,'blog'), orderBy('createdAt','desc')), s => {
    window._blog = s.docs.map(d=>({id:d.id,...d.data()})); renderBlog(); flashSync();
  });
  onSnapshot(query(collection(db,'kadro'), orderBy('no')), s => {
    window._kadro = s.docs.map(d=>({id:d.id,...d.data()})); renderKadro();
  });
  onSnapshot(query(collection(db,'mac'), orderBy('createdAt','desc')), s => {
    window._mac = s.docs.map(d=>({id:d.id,...d.data()})); renderMac();
  });
  onSnapshot(collection(db,'settings'), s => {
    s.docs.forEach(d => { if(d.id==='logo') applyLogo(d.data().url); });
  });
}

function flashSync() {
  const el = document.getElementById('syncDot');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

/* ── Logo ── */
function applyLogo(url) {
  if (!url) return;
  document.getElementById('hLogo').innerHTML = `<img src="${url}">`;
  document.getElementById('loginLogo').innerHTML = `<img src="${url}">`;
}

/* ── Auth ── */
function openLogin() { document.getElementById('loginScreen').classList.add('active'); }
function closeLogin() { document.getElementById('loginScreen').classList.remove('active'); }
function doLogin() {
  const u = document.getElementById('lusr').value.trim();
  const p = document.getElementById('lpass').value;
  if (u===AU && p===AP) { isAdmin=true; closeLogin(); setAdminUI(); }
  else document.getElementById('lerr').style.display='block';
}
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginScreen').classList.contains('active')) doLogin();
});
function logout() { isAdmin=false; setAdminUI(); }
function setAdminUI() {
  document.getElementById('adminBtn').style.display = isAdmin?'none':'';
  document.getElementById('logoutBtn').classList.toggle('vis', isAdmin);
  document.querySelectorAll('.add-btn').forEach(b=>b.classList.toggle('vis',isAdmin));
  renderBlog(); renderKadro(); renderMac();
}

/* ── Pages ── */
function showPage(p) {
  ['blog','kadro','mac'].forEach(x => {
    document.getElementById(x+'Page').classList.remove('active');
    document.getElementById('nav'+x.charAt(0).toUpperCase()+x.slice(1)).classList.remove('active');
  });
  document.getElementById(p+'Page').classList.add('active');
  document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
}

/* ── Render ── */
function adm(type, id, imgPath='') {
  if (!isAdmin) return '';
  return `<div class="adm">
    <button class="ebtn" onclick="editItem('${type}','${id}')">Düzenle</button>
    <button class="dbtn" onclick="delItem('${type}','${id}','${imgPath}')">Sil</button>
  </div>`;
}

function renderBlog() {
  const g = document.getElementById('blogGrid');
  if (!window._blog.length) { g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">📰</div><p>Henüz yazı yok.</p></div>`; return; }
  g.innerHTML = window._blog.map(b=>`
    <div class="blog-card">
      <div class="blog-card-img">${b.img?`<img src="${b.img}">`:`<div class="no-img">RB</div>`}</div>
      <div class="blog-card-body">
        ${b.category?`<span class="blog-cat">${b.category}</span>`:''}
        <div class="blog-title">${b.title||''}</div>
        <div class="blog-excerpt">${b.content?(b.content.substring(0,130)+'...'):''}</div>
      </div>
      <div class="blog-footer"><span>${b.date||''}</span>${adm('blog',b.id,b.imgPath||'')}</div>
    </div>`).join('');
}

function renderKadro() {
  const g = document.getElementById('kadroGrid');
  if (!window._kadro.length) { g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">⚽</div><p>Henüz oyuncu yok.</p></div>`; return; }
  g.innerHTML = window._kadro.map(k=>`
    <div class="kadro-card">
      <div class="k-avatar">${k.img?`<img src="${k.img}">`:(k.name||'?').charAt(0)}</div>
      <div class="k-no">#${k.no||'?'}</div>
      <div class="k-name">${k.name||''}</div>
      <div class="k-pos">${k.position||''}</div>
      <div class="k-nat">${k.nationality||''}</div>
      <div style="margin-top:10px">${adm('kadro',k.id,k.imgPath||'')}</div>
    </div>`).join('');
}

function renderMac() {
  const l = document.getElementById('macList');
  if (!window._mac.length) { l.innerHTML=`<div class="empty"><div class="ico">🏟️</div><p>Henüz maç yok.</p></div>`; return; }
  l.innerHTML = window._mac.map(m=>`
    <div class="mac-card">
      <div class="mac-head">
        <div class="mac-head-left">
          <span class="mac-badge">${m.league||'Lig Maçı'}</span>
          <span class="mac-date">📅 ${m.date||''} ${m.time?'⏰ '+m.time:''}</span>
        </div>
        ${adm('mac',m.id)}
      </div>
      <div class="mac-body">
        <div class="mac-team">
          <div class="mac-logo">${m.team1logo?`<img src="${m.team1logo}">`:'🔵'}</div>
          <div class="mac-tname">${m.team1||'Ev Sahibi'}</div>
        </div>
        ${(m.score1!==undefined&&m.score1!=='')?`<div class="mac-score">${m.score1} - ${m.score2}</div>`:`<div class="mac-vs">VS</div>`}
        <div class="mac-team">
          <div class="mac-logo">${m.team2logo?`<img src="${m.team2logo}">`:'⚽'}</div>
          <div class="mac-tname">${m.team2||'Deplasman'}</div>
        </div>
      </div>
      <div class="mac-meta">
        ${m.referee?`<span>⚖️ ${m.referee}</span>`:''}
        ${m.stadium?`<span>🏟️ ${m.stadium}</span>`:''}
        ${m.weather?`<span>🌤️ ${m.weather}</span>`:''}
        ${m.city?`<span>📍 ${m.city}</span>`:''}
      </div>
    </div>`).join('');
}

/* ── Modal ── */
function openModal(type, item) {
  editId = item?.id||null; editType = type; imgCache = {};
  const box = document.getElementById('modalBox');
  const v = (k,fb='')=>item?.[k]??fb;
  let h = '';

  if (type==='blog') {
    h=`<div class="modal-head"><h3>${editId?'YAZI DÜZENLE':'YENİ YAZI'}</h3><button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Başlık</label><input id="f_title" value="${v('title')}"></div>
      <div class="frow">
        <div class="fg"><label>Kategori</label><input id="f_cat" value="${v('category')}"></div>
        <div class="fg"><label>Tarih</label><input type="date" id="f_date" value="${v('date')}"></div>
      </div>
      <div class="fg"><label>İçerik</label><textarea id="f_content">${v('content')}</textarea></div>
      <div class="fg"><label>Kapak Fotoğrafı</label><input type="file" accept="image/*" onchange="ci(this,'img')">
        ${item?.img?`<img src="${item.img}" class="img-prev">`:''}
      </div>
      <div class="fg"><label>Site Logosu (değiştirmek istersen)</label><input type="file" accept="image/*" onchange="ci(this,'logo')"></div>
      <button class="sbtn" id="sbtn" onclick="saveItem()">KAYDET</button>
    </div>`;
  } else if (type==='kadro') {
    h=`<div class="modal-head"><h3>${editId?'OYUNCU DÜZENLE':'YENİ OYUNCU'}</h3><button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fg"><label>Ad Soyad</label><input id="f_name" value="${v('name')}"></div>
        <div class="fg"><label>Forma No</label><input type="number" id="f_no" value="${v('no')}"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Mevki</label><select id="f_pos">
          ${['Kaleci','Defans','Orta Saha','Forvet','Teknik Direktör','Antrenör'].map(p=>`<option ${v('position')===p?'selected':''}>${p}</option>`).join('')}
        </select></div>
        <div class="fg"><label>Milliyet</label><input id="f_nat" value="${v('nationality')}"></div>
      </div>
      <div class="fg"><label>Fotoğraf</label><input type="file" accept="image/*" onchange="ci(this,'img')">
        ${item?.img?`<img src="${item.img}" class="img-prev-round">`:''}
      </div>
      <button class="sbtn" id="sbtn" onclick="saveItem()">KAYDET</button>
    </div>`;
  } else if (type==='mac') {
    h=`<div class="modal-head"><h3>${editId?'MAÇ DÜZENLE':'YENİ MAÇ'}</h3><button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fg"><label>Takım 1 (Ev)</label><input id="f_t1" value="${v('team1','Rams Başakşehir')}"></div>
        <div class="fg"><label>Takım 2</label><input id="f_t2" value="${v('team2')}"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Takım 1 Logosu</label><input type="file" accept="image/*" onchange="ci(this,'t1logo')">
          ${item?.team1logo?`<img src="${item.team1logo}" style="width:40px;height:40px;object-fit:contain;margin-top:6px">`:''}
        </div>
        <div class="fg"><label>Takım 2 Logosu</label><input type="file" accept="image/*" onchange="ci(this,'t2logo')">
          ${item?.team2logo?`<img src="${item.team2logo}" style="width:40px;height:40px;object-fit:contain;margin-top:6px">`:''}
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label>Tarih</label><input type="date" id="f_date" value="${v('date')}"></div>
        <div class="fg"><label>Saat</label><input type="time" id="f_time" value="${v('time')}"></div>
      </div>
      <div class="fg"><label>Lig / Kupa</label><input id="f_league" value="${v('league','Süper Lig')}"></div>
      <div class="frow">
        <div class="fg"><label>Stad</label><input id="f_stad" value="${v('stadium')}"></div>
        <div class="fg"><label>Şehir</label><input id="f_city" value="${v('city')}"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Hakem</label><input id="f_ref" value="${v('referee')}"></div>
        <div class="fg"><label>Hava Durumu</label><input id="f_hava" value="${v('weather')}" placeholder="18°C Güneşli"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Skor T1</label><input type="number" id="f_s1" value="${v('score1')}"></div>
        <div class="fg"><label>Skor T2</label><input type="number" id="f_s2" value="${v('score2')}"></div>
      </div>
      <button class="sbtn" id="sbtn" onclick="saveItem()">KAYDET</button>
    </div>`;
  }

  box.innerHTML = h;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); editId=null; editType=null; imgCache={}; }
function bgClick(e) { if(e.target===document.getElementById('modalBg')) closeModal(); }

function editItem(type, id) {
  const src = type==='blog'?window._blog : type==='kadro'?window._kadro : window._mac;
  const item = src.find(x=>x.id===id);
  if (item) openModal(type, item);
}

function ci(input, key) {
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => { imgCache[key]=e.target.result; };
  r.readAsDataURL(f);
}

function gv(id) { const el=document.getElementById(id); return el?el.value:''; }

async function uploadImg(b64, path) {
  if (!b64) return null;
  const { storage, ref, uploadString, getDownloadURL } = window._fb;
  const r = ref(storage, path);
  await uploadString(r, b64, 'data_url');
  return await getDownloadURL(r);
}

async function saveItem() {
  if (!window._fb) { alert('Firebase bağlı değil!'); return; }
  const btn = document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='KAYDEDİLİYOR...';
  setLoading(true);

  const { db, collection, addDoc, doc, updateDoc, setDoc } = window._fb;
  const ts = Date.now();
  let obj = {};

  try {
    if (editType==='blog') {
      let imgUrl=null, imgPath=null;
      if (imgCache.img) { imgPath=`blog/${ts}.jpg`; imgUrl=await uploadImg(imgCache.img,imgPath); }
      if (imgCache.logo) {
        const lu = await uploadImg(imgCache.logo,'settings/logo.jpg');
        await setDoc(doc(db,'settings','logo'),{url:lu});
      }
      obj = { title:gv('f_title'), category:gv('f_cat'), date:gv('f_date'), content:gv('f_content'), createdAt:ts };
      if (imgUrl) { obj.img=imgUrl; obj.imgPath=imgPath; }
      else if (editId) { const ex=window._blog.find(x=>x.id===editId); if(ex?.img){obj.img=ex.img; obj.imgPath=ex.imgPath||'';} }

    } else if (editType==='kadro') {
      let imgUrl=null, imgPath=null;
      if (imgCache.img) { imgPath=`kadro/${ts}.jpg`; imgUrl=await uploadImg(imgCache.img,imgPath); }
      obj = { name:gv('f_name'), no:parseInt(gv('f_no'))||0, position:gv('f_pos'), nationality:gv('f_nat'), createdAt:ts };
      if (imgUrl) { obj.img=imgUrl; obj.imgPath=imgPath; }
      else if (editId) { const ex=window._kadro.find(x=>x.id===editId); if(ex?.img){obj.img=ex.img; obj.imgPath=ex.imgPath||'';} }

    } else if (editType==='mac') {
      const ex = editId ? window._mac.find(x=>x.id===editId) : null;
      let t1logo = ex?.team1logo||null, t2logo = ex?.team2logo||null;
      if (imgCache.t1logo) t1logo = await uploadImg(imgCache.t1logo,`mac/${ts}_t1.jpg`);
      if (imgCache.t2logo) t2logo = await uploadImg(imgCache.t2logo,`mac/${ts}_t2.jpg`);
      obj = { team1:gv('f_t1'), team2:gv('f_t2'), date:gv('f_date'), time:gv('f_time'), league:gv('f_league'), stadium:gv('f_stad'), city:gv('f_city'), referee:gv('f_ref'), weather:gv('f_hava'), score1:gv('f_s1'), score2:gv('f_s2'), createdAt:ts };
      if (t1logo) obj.team1logo=t1logo;
      if (t2logo) obj.team2logo=t2logo;
    }

    if (editId) await updateDoc(doc(db,editType,editId), obj);
    else await addDoc(collection(db,editType), obj);

    setLoading(false); closeModal();
  } catch(err) {
    alert('Hata: '+err.message);
    btn.disabled=false; btn.textContent='KAYDET';
    setLoading(false);
  }
}

async function delItem(type, id, imgPath) {
  if (!confirm('Silmek istediğinize emin misiniz?')) return;
  setLoading(true);
  const { db, doc, deleteDoc, storage, ref, deleteObject } = window._fb;
  try {
    await deleteDoc(doc(db,type,id));
    if (imgPath) await deleteObject(ref(storage,imgPath)).catch(()=>{});
  } catch(e) { console.error(e); }
  setLoading(false);
}

function setLoading(on) {
  const b=document.getElementById('loadingBar');
  if(on){b.className='show';}else{b.className='done';setTimeout(()=>b.className='',400);}
}
</script>
</body>
</html>
